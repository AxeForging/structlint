name: PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # The squash-merge commit uses the PR title, so validate it with the shared
  # action pinned to an immutable revision.
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: AxeForging/reusable-workflows/actions/pr-title-lint@291855e85ec985d1d318df82b8f9dce969b76933
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-title: ${{ github.event.pull_request.title }}

  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Advisory AI review — never a PR gate. continue-on-error keeps the
      # check green when GEMINI_API_KEY is missing (forks, unconfigured
      # repos) or when reviewforge itself errors.
      - uses: AxeForging/reviewforge@main
        continue-on-error: true
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_PROVIDER: gemini
          AI_MODEL: gemini-2.5-flash
          AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHOW_TOKEN_USAGE: true
          INCREMENTAL: false
          REVIEW_RULES: concise

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      # Dogfood the exact source under review instead of downloading the latest
      # published release through AxeForging/structlint@main.
      - name: Build candidate binary
        run: make build
      - name: Validate repository structure
        run: ./bin/structlint validate --config .structlint.yaml

name: PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # The squash-merge commit uses the PR title, so validate it with the shared
  # action pinned to an immutable revision.
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: AxeForging/reusable-workflows/actions/pr-title-lint@291855e85ec985d1d318df82b8f9dce969b76933
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-title: ${{ github.event.pull_request.title }}

  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Advisory AI review — never a PR gate. continue-on-error keeps the
      # check green when GEMINI_API_KEY is missing (forks, unconfigured
      # repos) or when reviewforge itself errors.
      - uses: AxeForging/reviewforge@main
        continue-on-error: true
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_PROVIDER: gemini
          AI_MODEL: gemini-2.5-flash
          AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHOW_TOKEN_USAGE: true
          INCREMENTAL: false
          REVIEW_RULES: concise

  gauntlet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
      - name: Verify modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Install candidate and custom gates
        run: |
          go install .
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/AxeForging/dupehound@v0.1.0
      - uses: AxeForging/gauntlet@v0.1.0
        with:
          since: origin/${{ github.base_ref }}

  setup-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: setup
        uses: ./setup
        with:
          version: v0.6.0
      - name: Verify setup outputs and executable
        env:
          BINARY: ${{ steps.setup.outputs.binary }}
          VERSION: ${{ steps.setup.outputs.version }}
        run: |
          test -x "$BINARY"
          test -n "$VERSION"
          test "$(command -v structlint)" = "$BINARY"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  release-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.13.3
          args: check
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.13.3
          args: release --snapshot --clean
